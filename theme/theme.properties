# SciteMe base16 theming -- Tier 1 spike
#
# This file is picked up automatically by the `import *` line already present
# in the upstream SciTEGlobal.properties, so no upstream file is edited.
# It points SciTE's Lua startup script at theme.lua (shipped alongside
# SciTE.exe) and adds a Tools-menu command to cycle palettes.
#
# Note: this overrides the default ext.lua.startup.script
# ($(SciteUserHome)/SciTEStartup.lua). A shipping version should chain any
# pre-existing user startup script rather than replace it.

ext.lua.startup.script=$(SciteDefaultHome)/theme.lua
ext.lua.auto.reload=1

# Tools > Cycle Colour Theme  (calls the Lua global cycle_theme)
command.name.41.*=Cycle Colour Theme
command.41.*=cycle_theme
command.subsystem.41.*=3
command.mode.41.*=savebefore:no
command.shortcut.41.*=Ctrl+Shift+T
